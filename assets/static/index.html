<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prometheus - AI Agent</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Prometheus</h1>
        <p class="tagline">AI-first agent runtime</p>
        <div class="auth-section" id="auth-section">
            <input type="password" id="auth-token" placeholder="API Token (shown in terminal on startup)">
            <button id="auth-btn">Connect</button>
        </div>
        <div class="input-group" id="input-group" style="display: none;">
            <input type="text" id="goal" placeholder="What do you want to achieve?" autofocus>
            <button id="execute-btn">Execute</button>
        </div>
        <div class="status" id="status">
            <div class="status-text" id="output">Enter your API token to begin...</div>
        </div>
        <div class="health-bar" id="health-bar">
            <span>Loading...</span>
        </div>
        <div class="tasks-panel">
            <h2>Recent Tasks</h2>
            <div class="task-list" id="tasks-list"></div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
