name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run tests
        run: go test ./... -v -race

      - name: Build
        run: go build -ldflags="-s -w" -o prometheus ./cmd/prometheus

      - name: Verify binary size
        run: |
          SIZE=$(stat -c%s prometheus 2>/dev/null || stat -f%z prometheus 2>/dev/null || wc -c < prometheus)
          echo "Binary size: $SIZE bytes"
          if [ $SIZE -gt 26214400 ]; then
            echo "ERROR: Binary exceeds 25MB limit"
            exit 1
          fi

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Go vet
        run: go vet ./...

      - name: Run staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.6.1
          export PATH="$PATH:$(go env GOPATH)/bin"
          staticcheck ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v2.3.2
          golangci-lint run --timeout=5m