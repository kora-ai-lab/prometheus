name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            suffix: ''
          - goos: darwin
            goarch: arm64
            suffix: ''
          - goos: linux
            goarch: amd64
            suffix: ''
          - goos: linux
            goarch: arm64
            suffix: ''
          - goos: windows
            goarch: amd64
            suffix: '.exe'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build binary
        working-directory: ./go_version
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          output="prometheus-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}"
          go build -ldflags="-s -w" -o "$output" ./cmd/prometheus

      - name: Calculate checksum
        working-directory: ./go_version
        run: |
          output="prometheus-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}"
          sha256sum "$output" > "$output.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prometheus-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            go_version/prometheus-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
            go_version/prometheus-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
