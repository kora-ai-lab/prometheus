<!DOCTYPE html>
<html>
<head>
<style>
.avatar-prometheus {
  position: relative;
  width: 64px;
  height: 64px;
  margin: 20px;
  cursor: pointer;
  transition: transform 0.2s ease;
}

.avatar-prometheus:hover {
  transform: scale(1.05);
}

.avatar-cristaux {
  position: absolute;
  width: 100%;
  height: 100%;
  border: 2px solid rgba(26, 26, 46, 0.6);
  clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
  animation: rotation 20s linear infinite;
}

.avatar-cœur {
  position: absolute;
  width: 20px;
  height: 20px;
  background: radial-gradient(circle, #FF6B35 0%, transparent 70%);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: respiration 4s ease-in-out infinite;
}

.avatar-yeux {
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translateX(-50%);
  width: 12px;
  height: 6px;
  display: flex;
  gap: 2px;
}

.œil-gauche, .œil-droit {
  width: 4px;
  height: 4px;
  background: #FFD700;
  border-radius: 50%;
}

/* États */
.avatar-écoute .avatar-cœur {
  background: radial-gradient(circle, #1A1A2E 0%, transparent 70%);
  animation: respiration-calme 4s ease-in-out infinite;
}

.avatar-réflexion .avatar-cristaux {
  border-color: rgba(255, 215, 0, 0.8);
  animation: circuits-actifs 2s ease-in-out infinite;
}

.avatar-illumination .avatar-cœur {
  background: radial-gradient(circle, #FFD700 0%, transparent 70%);
  animation: éclats 1s ease-out infinite;
}

.avatar-co-création .avatar-cristaux {
  border-color: rgba(255, 107, 53, 0.8);
  animation: danse-fluide 3s ease-in-out infinite;
}

@keyframes respiration {
  0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
  50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
}

@keyframes rotation {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes circuits-actifs {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

@keyframes éclats {
  0% { transform: translate(-50%, -50%) scale(1); }
  50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.5; }
  100% { transform: translate(-50%, -50%) scale(1); }
}

@keyframes danse-fluide {
  0%, 100% { transform: rotate(0deg) scale(1); }
  25% { transform: rotate(5deg) scale(1.1); }
  50% { transform: rotate(-5deg) scale(1); }
  75% { transform: rotate(3deg) scale(1.05); }
}

.demo {
  display: flex;
  gap: 30px;
  padding: 20px;
  font-family: Arial, sans-serif;
}

.state-info {
  text-align: center;
  margin-top: 10px;
}
</style>
</head>
<body>
<h1>Avatar Prometheus - 4 États Émotionnels</h1>
<div class="demo">
  <div>
    <div class="avatar-prometheus avatar-écoute">
      <div class="avatar-cristaux">
        <div class="avatar-cœur">
          <div class="avatar-yeux">
            <div class="œil-gauche"></div>
            <div class="œil-droit"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="state-info">ÉCOUTE<br>Respiration calme</div>
  </div>
  
  <div>
    <div class="avatar-prometheus avatar-réflexion">
      <div class="avatar-cristaux">
        <div class="avatar-cœur">
          <div class="avatar-yeux">
            <div class="œil-gauche"></div>
            <div class="œil-droit"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="state-info">RÉFLEXION<br>Circuits actifs</div>
  </div>
  
  <div>
    <div class="avatar-prometheus avatar-illumination">
      <div class="avatar-cristaux">
        <div class="avatar-cœur">
          <div class="avatar-yeux">
            <div class="œil-gauche"></div>
            <div class="œil-droit"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="state-info">ILLUMINATION<br>Éclats dorés</div>
  </div>
  
  <div>
    <div class="avatar-prometheus avatar-co-création">
      <div class="avatar-cristaux">
        <div class="avatar-cœur">
          <div class="avatar-yeux">
            <div class="œil-gauche"></div>
            <div class="œil-droit"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="state-info">CO-CRÉATION<br>Danse fluide</div>
  </div>
</div>
</body>
</html>
