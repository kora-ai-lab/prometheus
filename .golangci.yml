version: 2

run:
  timeout: 5m

issues:
  exclude-use-default: false
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - unused
    - linters:
        - staticcheck
      text: "^U1000"
    - linters:
        - staticcheck
      text: "^SA4006"

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - unused